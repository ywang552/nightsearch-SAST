project_name: nightsearch-sast
seed: 42

data:
  dataset_name: synthetic_dictionary
  train_path: data/train_placeholder.npz
  val_path: data/val_placeholder.npz
  num_genes: 2000
  num_cell_types: 20
  spot_feature_dim: 2000
  synthetic:
    train_samples: 256
    val_samples: 64
    dirichlet_alpha: 0.5
    noise_std: 0.05
    reference_scale: 1.0

model:
  d_model: 128
  num_heads: 4
  num_layers: 1
  dropout: 0.1
  ref_hidden_dim: 128

train:
  epochs: 2
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.0001
  device: cpu
