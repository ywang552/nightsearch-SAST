name: Validate Full

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Free disk space on runner
        run: |
          echo "Disk usage before cleanup"
          df -h

          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

          echo "Disk usage after cleanup"
          df -h

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-compile --prefer-binary -r requirements.txt

      - name: Run complete test suite
        run: |
          PYTHONPATH=src pytest -q

      - name: Build Codex runtime image
        run: |
          docker build --tag codex-cloud-repo --pull .

      - name: Fail clearly when task input is missing
        run: |
          set +e
          output="$(docker run --rm -v "$PWD:/workspace" codex-cloud-repo 2>&1)"
          status=$?
          printf '%s\n' "$output"
          test "$status" -ne 0
          printf '%s\n' "$output" | grep -F "Set CODEX_TASK or CODEX_TASK_FILE"

      - name: Reach the entrypoint in dry-run mode
        run: |
          docker run --rm \
            -e CODEX_DRY_RUN=1 \
            -e CODEX_TASK="Inspect the repository and summarize the Python research scaffold." \
            -v "$PWD:/workspace" \
            codex-cloud-repo

      - name: Remove temporary Docker artifacts
        if: always()
        run: docker image prune -af || true
