name: Validate PR (Fast)

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f requirements.txt
          test -f configs/default.yaml
          test -f configs/smoke.yaml
          test -f src/nightsearch_sast/main.py
          test -f tests/test_smoke.py
          test -f reports/backlog.md

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-compile --prefer-binary -r requirements.txt

      - name: Run smoke config entrypoint
        run: |
          PYTHONPATH=src python -m nightsearch_sast.main --config configs/smoke.yaml

      - name: Run fast tests (exclude slow)
        run: |
          PYTHONPATH=src pytest -q -m "not slow"

      - name: Validate backlog format
        run: |
          python scripts/validate_backlog.py --path reports/backlog.md

      - name: Validate report hygiene policy
        run: |
          python scripts/check_report_hygiene.py

      - name: Lint shell entrypoint syntax
        run: bash -n scripts/run-codex.sh
